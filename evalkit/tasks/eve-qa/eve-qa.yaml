task: eve-qa
class: !function task.OpenEndedTask
output_type: generate_until
dataset_path: 'eve-esa/open-ended'
test_split: 'train'
doc_to_text: "Q: {{Question}}\n"
doc_to_target: '{{Answer}}'
gen_prefix: 'A: '
description: |
  You are a Satellite Communication expert. Please answer the following question with technical accuracy. Provide a clear, detailed answer. Do not include numerical examples, unless and do not overcomplicate easy questions.

generation_kwargs:
  temperature: 0.2
  max_tokens: 1000
  do_sample: false
  until:
    - "<|im_end|>"
    - "\nQ:"
    - "</s>"
    - "<|eot_id|>"
    - "<|end|>"
  add_generation_prompt: false
  continue_final_message: true
metadata:
  version: 2.1
fewshot_split: 'train'
fewshot_config:
  sampler: first_n
