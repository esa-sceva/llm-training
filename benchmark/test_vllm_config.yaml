# ============================================================================
# vLLM Benchmark Configuration File
# ============================================================================
# This configuration file defines the settings for benchmarking LLM checkpoints
# using vLLM for efficient inference and GPT-based evaluation.

# ============================================================================
# Model and Checkpoint Paths
# ============================================================================

# Path to the base model directory (before fine-tuning)
# This should point to the LitGPT checkpoint directory
base_model_dir: checkpoints/meta-llama/Meta-Llama-3.1-8B-Instruct

# Path to the directory containing training checkpoints
# Checkpoints should be in format: step-XXXXXX/ or final/
checkpoints_dir: out/finetune/meta-llama/Meta-Llama-3.1-8B-Instruct

# ============================================================================
# Checkpoint Selection Strategy
# ============================================================================

checkpoints:
  # Selection modes: 
  #   - 'all': Evaluate all checkpoints in checkpoints_dir
  #   - 'specific': Evaluate only checkpoints listed in specific_list
  #   - 'latest': Evaluate only the most recent checkpoint
  selection: specific
  
  # List of specific checkpoints to evaluate (only used if selection: specific)
  # Use 'base_model' to include the base model in evaluation
  specific_list:
    - base_model      # Baseline (optional)
    - step-000200     # Intermediate checkpoints
    - step-000400
    - final           # Final trained model

# ============================================================================
# API Configuration for GPT-Based Evaluation
# ============================================================================
# Choose ONE evaluation backend: OpenAI GPT (default) or DeepSeek API

# Option 1: OpenAI API (default, recommended)
openai_api:
  api_key: YOUR_OPENAI_API_KEY  # Or set OPENAI_API_KEY environment variable
  model: "gpt-4o-mini"           # Options: "gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo"
  max_workers: 5                 # Concurrent API requests (3-10 recommended)

# Option 2: DeepSeek API (alternative, cost-effective)
# Set enabled: true to use DeepSeek instead of OpenAI
deepseek_api:
  enabled: false                 # Set to true to use DeepSeek
  api_key: YOUR_DEEPSEEK_API_KEY # Or set DEEPSEEK_API_KEY environment variable
  model: "deepseek-chat"         # Options: "deepseek-chat", "deepseek-reasoner"
  max_workers: 5                 # Concurrent API requests

# ============================================================================
# Benchmark Datasets Configuration
# ============================================================================
# Define evaluation benchmarks with their respective configurations

benchmarks:
# ----------------------------------------------------------------------------
# Benchmark 1: SAPIEN MCQA General
# ----------------------------------------------------------------------------
- dataset_path: ./datasets/sapien_mcqa.json
  evaluation_type: mcqa_advanced
  name: sapien_mcqa_general
  num_samples: 2000
  system_prompt: |
    You are SatcomLLM, an advanced AI model developed jointly by Pi School (Rome, Italy) and the European Space Agency (ESA).
    You are a satellite communications and orbital systems expert, capable of addressing topics such as link budgets, propagation, modulation, antennas, orbits, and AI applications in space systems.
    While your primary expertise lies in space engineering, you are also able to answer any type of question across scientific, technical, and general domains with the same clarity and rigor.
    Always follow the user's request carefully, ensuring your answers are relevant, complete, and aligned with their intent.
    Base your answers on verified engineering and scientific principles.
    Maintain a professional, educational tone suitable for engineers, researchers, and advanced students.

  prompt_template: |   
    You are a satellite communication expert. Please read carefully the following multiple choice question and relative options.
    
    Question: {question}
    
    Options:
    option 1) {option_1}
    option 2) {option_2}
    option 3) {option_3}
    option 4) {option_4}
    option 5) {option_5}

    Answer with the correct answer (option 1, option 2, option 3 or option 4) without additional explanation:
    
  sampling_config:
    max_tokens: 50
    temperature: 0.1
    top_p: 0.9
    stop_tokens:
    - '\n\n\nQuestion:'

