# ============================================================================
# Experiment Configuration
# ============================================================================

experiment_name: satcom_llm_benchmark
output_dir: ./benchmark_results

# ============================================================================
# Logging Configuration
# ============================================================================

logging:
  level: INFO                    # Options: DEBUG, INFO, WARNING, ERROR
  save_logs: true
  log_file: ./benchmark_results/benchmark.log

# ============================================================================
# Results Configuration
# ============================================================================

results:
  save_summary_results: true     # Save summary CSV and JSON
  save_detailed_scores: true     # Save per-sample scores
  save_individual_results: true  # Save per-checkpoint results

# ============================================================================
# Cleanup Configuration
# ============================================================================
# Automatically delete temporary files after benchmarking

cleanup:
  delete_merged_litgpt: true     # Delete merged LitGPT checkpoints
  delete_hf_checkpoints: true    # Delete HuggingFace converted checkpoints

# ============================================================================
# vLLM Inference Configuration
# ============================================================================

vllm_config:
  # Precision and memory settings
  dtype: auto                    # Options: auto, bfloat16, float16, float32
  gpu_memory_utilization: 0.85   # GPU memory to use (0.0-1.0, default: 0.9)
  max_model_len: 4096            # Maximum sequence length
  
  # Multi-GPU settings
  tensor_parallel_size: 1        # Number of GPUs for tensor parallelism
  
  # Other settings
  trust_remote_code: true        # Allow custom model code
  batch_size: 50                 # Inference batch size
  
  # API server settings (if using server mode)
  port: 8000
  num_workers: 2
  request_timeout: 30
