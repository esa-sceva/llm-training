checkpoints_dir: /teamspace/studios/this_studio/out/finetune-2/llama-8b-dataset12-cot
cleanup:
  delete_hf_checkpoints: true
  delete_merged_litgpt: true
experiment_name: vllm_test_run
logging:
  level: INFO
  log_file: ./benchmark-2/vllm_benchmark_llama-8b-dataset12-cot.log
  save_logs: true
output_dir: ./benchmark-2
results:
  save_detailed_scores: true
  save_individual_results: true
  save_summary_results: true
vllm_config:
  dtype: auto
  gpu_memory_utilization: 0.8
  max_model_len: 2048
  tensor_parallel_size: 1
  trust_remote_code: true
  port: 8000
  num_workers: 2        # Number of concurrent request threads (increase if server is stable)
  batch_size: 10        # Process requests in batches to avoid overwhelming server
  batch_delay: 3        # Seconds to wait between batches (reduce if server is stable)
  request_timeout: 20   # Timeout in seconds for each API request (default: 30)
